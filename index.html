<!DOCTYPE html>
<!--Define que o documento está usando HTML5-->
<html lang="pt-BR">
    <!--Tag raiz do documento Lang define o idioma da página-->
<head>
    <!--Cabeçalho da página invisível para o usuário-->
    <meta charset="UTF-8">
    <!--Define a codificação dos caractares (acentos funcionando corretamente)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Faz a página se adaptar a celulares e tablets-->
    <title>Meu Blog</title>
    <!--Título que aparece na aba do navegador-->
</head>
<body>
    <!--Corpo da página(tudo que aparece para o usuário)-->
    <header>
        <!--Cabeçalho visível da página-->
       <img src="logo-nerd.webp" alt="logo-nerd" srcset="" height="100%" width="200px">
       <!--img = Exibe uma imagem-->
       <!--src = caminha da imagem-->
       <!--alt = texto de referência da imagem-->
       <!--width = largura da imagem-->
       <!--height = altura da imagem-->
       <nav>
        <!--Área de navegação-->
        <a href="#filmes">Filmes</a>
        <a href="#desenhos">Desenhos</a>
        <a href="https://youtube.com"target="blank">Youtube</a>
        <!--tag <a> cria um link-->
            <!--href = destino do site (página)-->
            <!--target="_blank" abre em uma nova aba-->

       </nav>
    </header>
    <main>
        <!--Conteúdo principal de página-->
        <h1>BLOG DE FILMES E DESENHOS NERD's</h1>
        <!--Título principal da página-->
    </main>
    <footer>
        <!--Rodapé da página, informações gerais-->
        rodapé
    </footer>
</body>
</html>
